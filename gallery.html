<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Photo gallery featuring academic events, conferences and milestones of Prof. M. Radhakrishna Pillai.">
    <title>Gallery | Prof. M. Radhakrishna Pillai</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/gallery.css">

</head>

<body>

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <main>

        <!-- TOP -->

        <section class="gallery-top">

            <div class="container">

                <h1>
                    Gallery
                </h1>

                <p>
                    Academic milestones, scientific collaborations, conferences, institutional leadership and moments
                    from the research journey.
                </p>

            </div>

        </section>

        <!-- GALLERY -->

        <section class="gallery-section">

            <div class="container">

                <div class="gallery-grid" id="galleryGrid"></div>

            </div>

        </section>

    </main>

    <!-- MODAL -->

    <div class="modal fade" id="imageModal" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered modal-xl">

            <div class="modal-content position-relative">

                <!-- CLOSE -->

                <button type="button" class="btn-close btn-close-white custom-close" data-bs-dismiss="modal"></button>

                <!-- PREV -->

                <button class="nav-btn prev-btn" onclick="prevImage()">
                    <i class="bi bi-chevron-left"></i>
                </button>

                <!-- NEXT -->

                <button class="nav-btn next-btn" onclick="nextImage()">
                    <i class="bi bi-chevron-right"></i>
                </button>

                <div class="modal-body">

                    <img id="modalImage" src="" alt="Gallery Image">

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <div id="footer"></div>

    <!-- JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/main.js"></script>
    <script>

        const totalImages = 93;

        const galleryGrid = document.getElementById('galleryGrid');

        for (let i = 1; i <= totalImages; i++) {

            const imagePath = `assets/images/gallery/${i}.jpg`;

            galleryGrid.innerHTML += `

        <div class="gallery-item"
             data-bs-toggle="modal"
             data-bs-target="#imageModal"
             onclick="showImage('${imagePath}')">

            <img src="${imagePath}" alt="Gallery Image">

            

        </div>

    `;
        }

    </script>

    <script>

        const galleryImages = [];

        for (let i = 1; i <= 93; i++) {

            galleryImages.push(`assets/images/gallery/${i}.jpg`);

        }

        let currentImageIndex = 0;

        function showImage(src) {

            currentImageIndex = galleryImages.indexOf(src);

            document.getElementById('modalImage').src = src;
        }

        function nextImage() {

            currentImageIndex++;

            if (currentImageIndex >= galleryImages.length) {

                currentImageIndex = 0;
            }

            document.getElementById('modalImage').src =
                galleryImages[currentImageIndex];
        }

        function prevImage() {

            currentImageIndex--;

            if (currentImageIndex < 0) {

                currentImageIndex = galleryImages.length - 1;
            }

            document.getElementById('modalImage').src =
                galleryImages[currentImageIndex];
        }

        /* KEYBOARD NAVIGATION */

        document.addEventListener('keydown', function (e) {

            const modal = document.getElementById('imageModal');

            if (modal.classList.contains('show')) {

                if (e.key === 'ArrowRight') {
                    nextImage();
                }

                if (e.key === 'ArrowLeft') {
                    prevImage();
                }

            }

        });

    </script>

</body>

</html>
